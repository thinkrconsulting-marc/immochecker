# Nixpacks build-config voor Railway.
# Zorgt dat de Chromium-systeemlibraries (voor Playwright) beschikbaar zijn,
# bouwt de monorepo en installeert de Chromium-browser voor de scraper.

[phases.setup]
nixPkgs = ["nodejs_20"]
# Systeemlibraries die Chromium (headless) nodig heeft.
aptPkgs = [
  "libnss3", "libnspr4", "libatk1.0-0", "libatk-bridge2.0-0", "libcups2",
  "libdrm2", "libdbus-1-3", "libxkbcommon0", "libatspi2.0-0", "libx11-6",
  "libxcomposite1", "libxdamage1", "libxext6", "libxfixes3", "libxrandr2",
  "libgbm1", "libpango-1.0-0", "libcairo2", "libasound2"
]

[phases.install]
cmds = ["npm install"]

[phases.build]
cmds = [
  "npm run build",
  "npx playwright install chromium"
]

[start]
cmd = "npm run start"

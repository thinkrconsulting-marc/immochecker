# Nixpacks build-config voor Railway.
# Bouwt de monorepo en bereidt Playwright voor.

[phases.setup]
nixPkgs = ["nodejs_20", "chromium"]

[phases.install]
cmds = ["npm install --include=dev"]

[phases.build]
cmds = [
  "npm run build",
  "npx playwright install chromium"
]

[start]
cmd = "npm run start"
